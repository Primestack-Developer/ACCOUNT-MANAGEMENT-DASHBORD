services:
  - type: web
    name: cobbler-shoe-laundry
    runtime: node
    plan: starter
    buildCommand: npm install --build-from-source && node make-logo.js && cd frontend && npm install && npm run build && cd ..
    startCommand: node server.js
    healthCheckPath: /health
    disk:
      name: cobbler-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_PATH
        value: /var/data/cobbler.db
      - key: BACKUP_DIR
        value: /var/data/backup
      - key: JWT_SECRET
        sync: false
