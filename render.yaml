services:
  - type: web
    name: cobbler-shoe-laundry
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: cobbler-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/cobbler.db
      - key: BACKUP_DIR
        value: /var/data/backup
      - key: JWT_SECRET
        sync: false
